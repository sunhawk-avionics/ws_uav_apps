engine_rpm_model:
  ros__parameters:
    # -------------------- topics --------------------
    input_engine_ctrl_topic: "/fmu/out/sunhawk_engine_ctrl"
    input_thrust_sp_topic: "/fmu/out/vehicle_thrust_setpoint"

    output_realtime_topic: "/fmu/in/sunhawk_realtime_data"
    output_monitor_topic: "/fmu/in/sunhawk_engine_monitor"
    output_rpm_topic: "/fmu/in/rpm"

    update_rate_hz: 50.0

    # 选择从 SunhawkEngineCtrl 里取哪个字段作为“油门/燃油指令”
    # - true : 优先用 msg.output（如果该字段存在）
    # - false: 用 msg.throttle
    throttle_prefer_output_field: true

    # thrust_setpoint.z -> collective 归一化映射：
    # collective = clamp(scale * thrust_z + offset, 0..1)
    # PX4 通常 thrust_z 为负，所以下面 scale=-1 可以把 -0.6 变成 0.6
    thrust_z_to_collective_scale: -1.0
    thrust_z_to_collective_offset: 0.0

    # -------------------- throttle input mapping --------------------
    # 将“控制器输出/油门原始值”映射到 0..1
    # 如果你的输入本来就是 -1..1，请改成：min=-1 max=1
    throttle_in_min: 0.0
    throttle_in_max: 1.0
    throttle_inverted: false
    throttle_deadband: 0.0
    throttle_expo: 1.0

    # 对油门命令额外加一个 slew（一般可以非常大，相当于不限制；
    # 真正的动态主要靠 fuel_tau/fuel_rate 来体现）
    throttle_slew_up: 100.0
    throttle_slew_down: 100.0

    # collective 低通滤波（让总距阶跃不要像“方波”一样硬）
    collective_smoothing_tau: 0.05

    # -------------------- engine limits / init --------------------
    rpm_idle: 1600.0
    rpm_max: 5800.0
    rpm_init: 0.0

    # -------------------- shaft dynamics --------------------
    # 转动惯量（归一化模型的关键）：
    # - 值越大：加减速越“肉”
    # - 值越小：rpm 响应越快（甚至像一阶查表）
    shaft_inertia_J: 0.00035

    # -------------------- fuel actuator dynamics --------------------
    fuel_tau: 0.08
    fuel_rate_up: 3.0
    fuel_rate_down: 6.0
    fuel_min: 0.0
    fuel_max: 1.0

    # -------------------- engine torque curve --------------------
    # T_engine = fuel * torque_max * torque_curve(rpm)
    torque_max: 1.0
    torque_curve_rpm:  [0.0, 1600.0, 3000.0, 5000.0, 5800.0]
    torque_curve_norm: [0.40, 0.65, 0.90, 1.00, 0.90]

    # 额外的寄生阻力（可选）：drag_c2 可以模拟高速风阻/齿轮箱搅油损失
    drag_c0: 0.0
    drag_c1: 0.0
    drag_c2: 0.0

    # -------------------- rotor/load calibration --------------------
    # 核心：用“定转速下的标定表”把负载建出来
    # 在 load_rpm_ref(5000rpm) 下，维持该 rpm 所需的油门(0..1)
    load_rpm_ref: 5000.0
    load_omega_exp: 2.0
    air_density_ratio: 1.0

    # 标定点（可继续加点让曲线更真实）
    # collective_points 与 fuel_required_points 必须等长
    # 例子：coll=0 需要 0.23；coll=0.85 需要 0.77
    collective_points:      [0.00, 0.20, 0.40, 0.60, 0.85, 1.00]
    fuel_required_points:   [0.23, 0.30, 0.40, 0.55, 0.77, 0.88]

    # 额外二次负载项（可选，用于补“随 rpm 升高负载更陡”的感觉）
    extra_load_coeff: 0.0

    # -------------------- stage / start / idle --------------------
    use_stage_input: true
    stage_off: 0
    stage_start: 1
    stage_run: 2
    stage_shutdown: 3

    starter_torque: 0.25
    start_fuel: 0.18

    # idle 模式：当 throttle 很小且总距很小（或处于 STARTING）时，
    # 使用内部 PI 维持 idle_rpm
    idle_controller_enable: true
    idle_rpm: 1600.0
    idle_throttle_threshold: 0.02
    idle_collective_threshold: 0.05
    idle_kp: 0.0006
    idle_ki: 0.15
    idle_fuel_min: 0.05
    idle_fuel_max: 0.30
    idle_integ_min: -5.0
    idle_integ_max:  5.0

    # -------------------- optional internal governor --------------------
    # 如果希望“仿真节点自己定转速并反推油门”，打开 governor_enable
    # 注意：这会忽略输入 throttle（仍会参考 collective 作为前馈）
    governor_enable: false
    governor_rpm_setpoint: 5000.0
    governor_kp: 0.0008
    governor_ki: 0.20
    governor_integ_min: -2.0
    governor_integ_max:  2.0
    governor_output_min: 0.0
    governor_output_max: 1.0
    governor_use_feedforward: true
    governor_slew_up: 2.5
    governor_slew_down: 4.0
    governor_droop: 0.0

    # -------------------- sensor model --------------------
    rpm_sensor_tau: 0.02
    rpm_noise_std: 0.0
