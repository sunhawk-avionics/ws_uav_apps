engine_rpm_model:
  ros__parameters:

    # -------------------- topics --------------------
    input_engine_ctrl_topic: "/fmu/out/sunhawk_engine_ctrl"
    input_thrust_sp_topic: "/fmu/out/vehicle_thrust_setpoint"
    output_realtime_topic: "/fmu/in/sunhawk_realtime_data"
    output_monitor_topic: "/fmu/in/sunhawk_engine_monitor"
    output_rpm_topic: "/fmu/in/rpm"

    update_rate_hz: 50.0

    # 启动阶段强制：油门=0，总距=0
    start_force_throttle_zero: true
    start_force_collective_zero: true

    # start -> run 的切换条件：转速达到怠速的一定比例，并且持续最少时间
    start_to_run_rpm_ratio: 0.95
    start_to_run_min_time_s: 0.8

    # -------------------- throttle input mapping --------------------
    # SunhawkEngineCtrl 内部可能有 throttle / output 字段；这里优先使用 output（如果存在）
    throttle_prefer_output_field: true

    # throttle_raw -> 0..1
    throttle_in_min: 0.0
    throttle_in_max: 1.0
    throttle_inverted: false
    throttle_deadband: 0.00
    throttle_expo: 1.00

    # 输入油门平滑（命令侧），数值大=几乎不限制
    throttle_slew_up: 100.0
    throttle_slew_down: 100.0

    # -------------------- thrust setpoint -> collective --------------------
    # collective = clamp(scale * thrust_z + offset, 0..1)
    # PX4 中 thrust_z 通常为负（向上推力），所以 scale 给 -1 可以把它变成正的 collective
    thrust_z_to_collective_scale: -1.0
    thrust_z_to_collective_offset: 0.0

    # -------------------- stage mapping (内部状态机/监控发布) --------------------
    use_stage_input: true
    stage_off: 0
    stage_start: 1
    stage_run: 2
    stage_shutdown: 3

    # -------------------- engine limits --------------------
    rpm_idle: 1600.0
    rpm_max: 5800.0
    rpm_init: 0.0

    # 低于这个转速（OFF/SHUTDOWN）就直接“吸住”到 0，避免无限趋近 0 的尾巴
    rpm_stop_threshold: 20.0

    # -------------------- shaft dynamics --------------------
    # 转动惯量（归一化模型的关键）：
    # - 值越大：加减速越“肉”
    # - 值越小：rpm 响应越快（甚至像一阶查表）
    shaft_inertia_J: 0.00035

    # -------------------- fuel actuator dynamics --------------------
    fuel_tau: 0.08
    fuel_rate_up: 3.0
    fuel_rate_down: 6.0
    fuel_min: 0.0
    fuel_max: 1.0

    # -------------------- engine torque curve --------------------
    # T_engine = fuel * torque_max * torque_curve(rpm)
    torque_max: 1.0
    torque_curve_rpm:  [0.0, 1600.0, 3000.0, 5000.0, 5800.0]
    torque_curve_norm: [0.40, 0.65, 0.90, 1.00, 0.90]

    # 额外的寄生阻力：drag_c2 可以模拟高速风阻/齿轮箱搅油损失
    drag_c0: 0.001
    drag_c1: 0.0
    drag_c2: 0.0

    # -------------------- rotor/load calibration --------------------
    # 你给的标定：在定转速 5000 下，coll=0 -> throttle≈0.23；coll=0.85 -> throttle≈0.77
    # 这里把它当作“负载映射”，用于把总距转换成等效负载扭矩。
    load_rpm_ref: 5000.0
    load_omega_exp: 2.0
    air_density_ratio: 1.0

    # 标定点（可继续加点让曲线更真实）
    # collective_points 与 fuel_required_points 必须等长
    # 例子：coll=0 需要 0.23；coll=0.85 需要 0.77
    collective_points:      [0.00, 0.20, 0.40, 0.60, 0.85, 1.00]
    fuel_required_points:   [0.23, 0.30, 0.38, 0.50, 0.77, 0.90]

    # 额外二次负载项（可选，用于补“随 rpm 升高负载更陡”的感觉）
    extra_load_coeff: 0.0

    # 总距输入平滑（更“真实”一点，避免总距阶跃带来的数值抖动）
    collective_smoothing_tau: 0.05

    # -------------------- starting --------------------
    starter_torque: 0.25
    start_fuel: 0.18

    # -------------------- idle controller --------------------
    # 目标：start=true 且油门=0 时，维持 1600rpm（怠速）；油门在此基础上增加 rpm
    idle_controller_enable: true
    idle_rpm: 1600.0

    # 认为“接近 0 油门”的阈值（怠速 PI 仅在启动/接近 0 油门时更新）
    idle_throttle_threshold: 0.02

    idle_kp: 0.0006
    idle_ki: 0.005

    # 允许 idle PI 输出到 0（否则会出现怠速被抬高/无法稳定）
    idle_fuel_min: 0.0
    idle_fuel_max: 0.30

    idle_integ_min: -60.0
    idle_integ_max:  60.0

    # -------------------- optional internal governor --------------------
    # 如果希望“仿真节点自己定转速并反推油门”，打开 governor_enable
    # 注意：这会忽略输入 throttle（仍会参考 collective 作为前馈）
    governor_enable: false
    governor_rpm_setpoint: 5000.0
    governor_kp: 0.0008
    governor_ki: 0.20
    governor_integ_min: -2.0
    governor_integ_max:  2.0
    governor_output_min: 0.0
    governor_output_max: 1.0
    governor_use_feedforward: true
    governor_slew_up: 2.5
    governor_slew_down: 4.0
    governor_droop: 0.0

    # -------------------- rpm sensor model --------------------
    rpm_sensor_tau: 0.02
    rpm_noise_std: 15.0
